<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 Idul Fitri 2026 M / 1447 H</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Dancing+Script:wght@700&family=Shippori+Antique&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <i class="fas fa-mosque bg-ornament main"></i>
    <i class="fas fa-moon bg-ornament"></i>
    <i class="fas fa-book-quran bg-ornament"></i>
    <i class="fas fa-beads bg-ornament"></i>
    <i class="fas fa-drum bg-ornament"></i>
    
    <span class="unta-diam">🐫</span>
    <span class="unta-jalan">🐫🐫</span>

    <div class="torch t1 bg-ornament"><i class="fas fa-fire"></i><i class="fas fa-grip-lines-vertical"></i></div>
    <div class="torch t2 bg-ornament"><i class="fas fa-fire"></i><i class="fas fa-grip-lines-vertical"></i></div>

    <div id="MainContainer">
        <div id="sec-scan">
            <h1 style="font-family: 'Cinzel'; color: var(--gold); font-size: 24px; margin-bottom: 30px;">RAMADHAN DIGITAL RECORD</h1>
            <div class="scan-wrapper" id="scanBtn">
                <div class="scan-line"></div>
                <i class="fas fa-fingerprint"></i>
            </div>
            <p style="margin-top:25px; color: var(--gold); font-weight: bold; font-size: 18px;">Tekan tombol ini</p>
        </div>

        <div id="sec-loading" class="hidden">
            <h3 style="color: var(--gold); font-size: 20px;">MENIMBANG AMALAN...</h3>
            <div id="loadingBarContainer"><div id="loadingBar"></div></div>
            <p id="loadPersen" style="font-size: 20px; margin-top: 10px;">0%</p>
        </div>

        <div id="sec-diagnosa" class="hidden">
            <div class="custom-card">
                <div class="card-deco-line"></div>
                <div id="diagnosaBox" class="diagnosa-text"></div>
                <div class="card-deco-line" style="margin-left: auto;"></div>
            </div>
        </div>

        <div id="sec-ketupat" class="hidden">
            <div id="ketupatBtn">🫔</div> 
            <div class="ning-icon" style="top: 0; left: 20%;">⭐</div>
            <div class="ning-icon" style="top: 40px; right: 15%; animation-delay: 0.5s;">🌙</div>
            <div class="ning-icon" style="bottom: 100px; left: 10%; animation-delay: 1s;">✨</div>
            <p style="color: var(--gold); font-weight: bold; font-size: 18px;">ANALISIS SELESAI!<br>Klik !!!</p>
        </div>

        <div id="sec-card" class="hidden">
            <div class="custom-card" style="text-align: center;">
                <img src="saya.png" class="profile-img">
                <div class="card-deco-line" style="margin: 10px auto;"></div>
                <div id="textCard" style="color: white; font-size: 18px; line-height: 1.8; font-weight: bold;"></div>
                <div class="card-deco-line" style="margin: 10px auto;"></div>
                <button id="thrBtn" onclick="initiateTHR()">AJUKAN THR</button>
            </div>
        </div>
    </div>

    <div id="camContainer" class="hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden;">
        <div style="position:relative; width:280px; height:280px; border:4px solid var(--gold); border-radius:50%; overflow:hidden; box-shadow: 0 0 20px var(--gold);">
            <video id="video" autoplay playsinline style="width:100%; height:100%; object-fit:cover; transform: scaleX(-1);"></video>
        </div>
        <canvas id="canvas" width="320" height="240" class="hidden"></canvas>
        <p style="color:var(--gold); font-weight:bold; margin-top:30px; font-size:18px; text-shadow: 0 0 10px #000;">OKE LIHAT SINI... <br> (Verifikasi Wajah)</p>
    </div>

    <div id="ktpModal" class="hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; display:flex; align-items:center; justify-content:center; padding:15px; box-sizing:border-box;">
        <div style="background: linear-gradient(135deg, #1a2a6c, #2a4858); border: 2px solid var(--gold); border-radius: 15px; width:100%; max-width:350px; padding:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position:relative;">
            <h2 style="color:var(--gold); text-align:center; font-size:14px; margin-bottom:15px; border-bottom:1px solid rgba(241,196,15,0.3); padding-bottom:10px;">KARTU TANDA PENERIMA THR</h2>
            
            <div style="display:flex; flex-direction:row; gap:12px; align-items:flex-start;">
                <img id="photoResult" style="width:90px; height:110px; border:2px solid white; border-radius:5px; object-fit:cover; flex-shrink:0;">
                <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
                    <input id="ktpNama" placeholder="NAMA LENGKAP" style="width:100%; background:rgba(255,255,255,0.1); border:none; border-bottom:1px solid var(--gold); color:white; padding:8px; font-size:14px; border-radius:4px;">
                    <input id="ktpDana" placeholder="NOMOR DANA" style="width:100%; background:rgba(255,255,255,0.1); border:none; border-bottom:1px solid var(--gold); color:white; padding:8px; font-size:14px; border-radius:4px;">
                </div>
            </div>
            
            <button onclick="submitKTP()" style="width:100%; margin-top:20px; background:var(--gold); color:#000; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:15px; transition:0.3s active {transform:scale(0.95)}">KONFIRMASI DATA ✅</button>
        </div>
    </div>

    <audio id="bgMusic" src="instrumen.mp3" loop></audio>

    <script>
        const audio = document.getElementById("bgMusic");

        function launchRocket() {
            const rocket = document.createElement('div');
            rocket.className = 'rocket';
            const startX = Math.random() * window.innerWidth;
            const targetY = 50 + Math.random() * 250;
            rocket.style.left = startX + 'px';
            rocket.style.bottom = '0px';
            document.body.appendChild(rocket);
            rocket.animate([{ transform: 'translateY(0px)', opacity: 1 }, { transform: `translateY(-${window.innerHeight - targetY}px)`, opacity: 1 }], { duration: 1200 + Math.random()*500, easing: 'ease-out' }).onfinish = () => {
                confetti({ particleCount: 50, spread: 80, origin: { x: startX / window.innerWidth, y: targetY / window.innerHeight }, colors: ['#f1c40f', '#00ff88', '#ffffff', '#ff4500'], gravity: 0.6, scalar: 0.9 });
                rocket.remove();
            };
        }

        function fireBurst() { for(let i=0; i<7; i++) { setTimeout(launchRocket, i * 250); } }
        setInterval(fireBurst, 4000);

        const scanBtn = document.getElementById("scanBtn");
        let sTimer;

        scanBtn.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    
                    // 1. LAGU LANGSUNG MULAI DI SINI (DETIK KE-0 SAAT DITEKAN)
                    if (audio.paused) {
                        audio.play().catch(e => console.log("Izin browser diperlukan"));
                    }

                    document.querySelector(".scan-line").style.display = "block";
                    
                    // 2. PROSES SCAN TETAP JALAN 3 DETIK
                    sTimer = setTimeout(() => {
                        document.getElementById("sec-scan").classList.add("hidden");
                        startLoading();
                    }, 3000);
                });

        window.addEventListener("mouseup", () => {
            clearTimeout(sTimer);
            document.querySelector(".scan-line").style.display = "none";
        });

        function startLoading() {
            document.getElementById("sec-loading").classList.remove("hidden");
            let w = 0; let bar = document.getElementById("loadingBar");
            let id = setInterval(() => {
                if (w >= 100) { clearInterval(id); document.getElementById("sec-loading").classList.add("hidden"); runAnalysis();
                } else { w++; bar.style.width = w + '%'; document.getElementById("loadPersen").innerHTML = w + '%'; }
            }, 30);
        }

       function runAnalysis() {
            document.getElementById("sec-diagnosa").classList.remove("hidden");
            
            // Susunan teks: Judul Emoji -> Isi Catatan
            const report = "🧐 MENCATAT AMALAN...\n" +
                           "---------------------------\n" +
                           "• Sering mokel diam-diam 🥤\n" +
                           "• Ghibah tipis-tipis 🙊\n" +
                           "• jarang tadarus scrolling teruusss 📱\n" +
                           "• Rajin dhuha tapi pake qunut 👳‍♂️\n" +
                           "---------------------------\n" +
                           "[ERROR ‼️]:\n" +
                           "Terlalu banyak data yang tidak bisa ditampilkan ❌";

            let i = 0;
            const box = document.getElementById("diagnosaBox");
            box.innerHTML = ""; // Bersihkan box sebelum ngetik

            function type() {
                if (i < report.length) {
                    let char = report.charAt(i);
                    // Ganti \n jadi <br> agar rapi ke bawah
                    box.innerHTML += char === "\n" ? "<br>" : char;
                    i++; 
                    setTimeout(type, 40); // Kecepatan ngetik (40ms)
                } else {
                    // Tunggu 3 detik setelah ngetik selesai, lalu munculkan ketupat
                    setTimeout(() => {
                        document.getElementById("sec-diagnosa").classList.add("hidden");
                        const k = document.getElementById("sec-ketupat");
                        k.classList.remove("hidden"); 
                        k.classList.add("ketupat-drop");
                    }, 3000);
                }
            }
            type();
        }

        document.getElementById("ketupatBtn").onclick = function() {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            document.getElementById("sec-ketupat").remove();
            showFinal();
        };

        function showFinal() {
            document.getElementById("sec-card").classList.remove("hidden");
            const msg = "Selamat Hari Raya Idul Fitri✨🌙!\n nggk kerasa yah puasa udah beres aja, terima kasih atas kebersamaan, tawa, canda, dan cerita dibalik itu semua. \n mohon maaf atas segala kesalahan baik dalam perbuatan ataupun dalam ucapan \n تَقَبَّلَ اللَّهُ صِيَامَنَا وَصِيَامَكُمْ وَعَمَلَنَا وَعَمَلَكُمْ وَجَعَلَنَا وَإِيَّاكُمْ مِنَ الْعَائِدِينَ وَالْفَائِزِينَ وَأَنْتُمْ بِكُلِّ خَيْرٍ .\n 🤝😁 شكرًا كثيرًا ";
            let i = 0;
            function type() {
                if (i < msg.length) {
                    document.getElementById("textCard").innerHTML += msg.charAt(i) === "\n" ? "<br>" : msg.charAt(i);
                    i++; setTimeout(type, 50);
                } else { document.getElementById("thrBtn").style.display = "inline-block"; }
            }
            type();
        }

  async function initiateTHR() {
            const camDiv = document.getElementById('camContainer');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const photo = document.getElementById('photoResult');

            camDiv.classList.remove('hidden');

            try {
                // Konfigurasi khusus mobile: Pakai kamera depan (user)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                video.srcObject = stream;
                // Penting: Agar video tidak fullscreen otomatis di iOS
                video.setAttribute("playsinline", true); 
                
                // Proses verifikasi (4 detik)
                setTimeout(() => {
                    // Ambil gambar dari video ke canvas
                    canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
                    const data = canvas.toDataURL('image/png');
                    photo.src = data;
                    
                    // Matikan aliran kamera setelah capture
                    stream.getTracks().forEach(track => track.stop());
                    camDiv.classList.add('hidden');

                    // Notif Cakep
                    Swal.fire({
                        title: 'Cakep 😂',
                        background: '#0a0a0a',
                        color: 'white',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        // Tampilkan KTP Digital
                        document.getElementById('ktpModal').classList.remove('hidden');
                    });
                }, 4000); 

            } catch (err) {
                console.error(err);
                Swal.fire('Akses Gagal', 'Pastikan izin kamera sudah diizinkan ya!', 'error');
                camDiv.classList.add('hidden');
            }
        }

        function submitKTP() {
            const nama = document.getElementById('ktpNama').value;
            const dana = document.getElementById('ktpDana').value;

            if(!nama || !dana) {
                Swal.fire({
                    title: 'Eh!',
                    text: 'Nama dan No Dana harus diisi ya!',
                    icon: 'warning',
                    background: '#0a0a0a',
                    color: 'white'
                });
                return;
            }

            document.getElementById('ktpModal').classList.add('hidden');

            Swal.fire({
                title: 'Semoga Beruntung!',
                text: '😆',
                icon: 'success',
                background: '#0a0a0a',
                color: 'white'
            }).then(() => {
                showSaranPopUp(nama);
            });
        }

        async function showSaranPopUp(nama) {
            // Ambil nomor dana dari input yang diisi tadi
            const dana = document.getElementById('ktpDana').value;

            const { value: saran } = await Swal.fire({
                title: 'Kirim Pesan & Masukan',
                input: 'textarea',
                inputPlaceholder: 'Tulis pesan untuk Alman Maulana di sini...',
                background: '#0a0a0a',
                color: 'white',
                confirmButtonText: 'Kirim via WhatsApp ✅',
                confirmButtonColor: '#25D366'
            });

            if (saran) {
                // Format pesan sesuai permintaanmu
                const text = `Assalamualaikum......\n` +
                             `Saya ${nama}, ini nomor DANA saya: ${dana} 😊\n` +
                             `"${saran}"`;
                
                // Membuka WhatsApp dengan teks yang sudah diformat
                window.open(`https://wa.me/6281210190538?text=${encodeURIComponent(text)}`, '_blank');
                
            }
        }
    </script>

    <!-- footer -->
    <div class="footer-copyright">
        <p>Ramadhan Digital Record &copy; 2026</p>
        <a href="https://www.instagram.com/alman.mn.o1/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i> Create by Alman Maulana
        </a>
    </div>
</body>
</html>
